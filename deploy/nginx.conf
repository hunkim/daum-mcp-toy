# Alternative to Caddy if you already run nginx.
# Place at /etc/nginx/sites-available/daum-mcp and symlink into sites-enabled.
# Obtain the cert with: sudo certbot --nginx -d daum-mcp.toy.x.upstage.ai

server {
    listen 80;
    server_name daum-mcp.toy.x.upstage.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name daum-mcp.toy.x.upstage.ai;

    ssl_certificate     /etc/letsencrypt/live/daum-mcp.toy.x.upstage.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daum-mcp.toy.x.upstage.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Streamable-HTTP / SSE: disable buffering, allow long-lived connections.
    proxy_http_version 1.1;
    proxy_set_header  Connection "";
    proxy_buffering   off;
    proxy_cache       off;
    proxy_read_timeout 30m;
    proxy_send_timeout 30m;

    location / {
        proxy_pass http://127.0.0.1:8989;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
